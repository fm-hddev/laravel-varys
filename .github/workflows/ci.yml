name: CI

on:
  push:
    branches: [main, 'chore/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build adapters and core
        run: npm run build --workspaces --if-present

      - name: Test (unit + integration)
        run: npm run test --workspaces --if-present
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'

      - name: Build renderer
        run: npm run build --workspace=packages/renderer

      - name: Build Electron (Forge)
        run: npm run make --workspace=packages/main
        env:
          NODE_ENV: production
